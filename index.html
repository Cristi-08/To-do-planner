<!DOCTYPE html>
<html lang="ro" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart To-Do Planner</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <!-- Cristi -->
  <header id="header">
    <div class="header-logo">
      <span class="logo-icon">✅</span>
      <span class="logo-text">To-Do Planner</span>
    </div>
    <nav class="header-nav">
      <a href="#quote-section">Quote</a>
      <a href="#task-form-section">Tasks</a>
      <a href="#stats-section">Stats</a>
    </nav>
    <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
  </header>

  <main>

    <!-- ===== QUOTE SECTION ===== -->
    <!-- Mircea -->
    <section id="quote-section">
      <div class="quote-container">
        <p id="quote-text">Se încarcă citatul zilei...</p>
        <p id="quote-author"></p>
        <button id="new-quote-btn" onclick="fetchQuote()">🔄 Citat nou</button>
      </div>
    </section>

    <!-- ===== TASK FORM ===== -->
    <!-- Mircea -->
    <section id="task-form-section">
      <h2>➕ Adaugă task</h2>
      <div class="form-container">
        <input type="text" id="task-input" placeholder="Scrie un task nou..." />
        <select id="task-category">
          <option value="school">🎓 Școală</option>
          <option value="personal">👤 Personal</option>
          <option value="project">💼 Proiect</option>
        </select>
        <select id="task-priority">
          <option value="urgent">🔴 Urgent</option>
          <option value="normal">🟡 Normal</option>
          <option value="relaxed">🟢 Relaxed</option>
        </select>
        <button id="add-task-btn" onclick="addTask()">Adaugă</button>
      </div>
    </section>

    <!-- ===== TASK LIST ===== -->
    <!-- Mircea -->
    <section id="task-list-section">
      <!-- va fi completat -->
    </section>

    <!-- ===== STATISTICS ===== -->
    <!-- Cristi -->
    <section id="stats-section">
      <h2>📊 Statistici săptămânale</h2>
      <div class="stats-container">
        <div class="stat-card">
          <span class="stat-number" id="total-tasks">0</span>
          <span class="stat-label">Total taskuri</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="completed-tasks">0</span>
          <span class="stat-label">Completate</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="pending-tasks">0</span>
          <span class="stat-label">În așteptare</span>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer id="footer">
    <p>Smart To-Do Planner &copy; 2025</p>
    <p>Realizat de Arpente Cristian &amp; Mardari Mircea &mdash; DAW-241, UTM</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
